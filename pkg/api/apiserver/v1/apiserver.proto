// MiniBlog API 定义，包含健康检查、用户管理和文章管理的 RPC 接口
syntax = "proto3";

package v1;

// 提供用于定义 HTTP 映射的功能，比如通过 option (google.api.http) 实现 gRPC 到 HTTP 的映射
import "google/api/annotations.proto";
// 提供了一个标准的空消息类型 google.protobuf.Empty，适用于 RPC 方法不需要输入消息或输出消息的场景
import "google/protobuf/empty.proto";
// 定义当前服务所依赖的健康检查消息
import "apiserver/v1/healthz.proto";
// 定义当前服务所依赖的博客消息
import "apiserver/v1/post.proto";
// 定义当前服务所依赖的用户消息
import "apiserver/v1/user.proto";
import "apiserver/v1/ai_news.proto";
// 为生成 OpenAPI 文档提供相关注释（如标题、版本、作者、许可证等信息）
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/onexstack/miniblog/pkg/api/apiserver/v1;v1";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
        title: "miniblog API";
        version: "1.0";
        description: "";
        contact: {
            name: "小而美的博客项目";
            url: "https://github.com/onexstack/miniblog";
            email: "colin404@foxmail.com";
        };
        license: {
            name: "MIT License";
            url: "https://github.com/onexstack/miniblog/blob/master/LICENSE";
        };
    };
    schemes: HTTPS;
    consumes: "application/json";
    produces: "application/json";
};

service MiniBlog {
    rpc Healthz(google.protobuf.Empty) returns (HealthzResponse) {
        option (google.api.http) = {
            get: "/healthz",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "服务健康检查";
            operation_id: "Healthz";
            tags: "服务治理";
        };
    }

    rpc Login(LoginRequest) returns (LoginResponse) {
        option (google.api.http) = {
            post: "/login",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "用户登录";
            operation_id: "Login";
            description: "";
            tags: "用户管理";
        };
    }

    rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
        option (google.api.http) = {
          put: "/refresh-token",
          body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "刷新令牌";
            operation_id: "RefreshToken";
            description: "";
            tags: "用户管理";
        };
    }

    rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse) {
        option (google.api.http) = {
            put: "/v1/users/{userID}/change-password",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "修改密码";
            operation_id: "ChangePassword";
            tags: "用户管理";
        };
    }

    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
        option (google.api.http) = {
            post: "/v1/users",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "创建用户";
            operation_id: "CreateUser";
            tags: "用户管理";
        };
    }

    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
        option (google.api.http) = {
            put: "/v1/users/{userID}",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "更新用户信息";
            operation_id: "UpdateUser";
            tags: "用户管理";
        };
    }

    rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
        option (google.api.http) = {
            delete: "/v1/users/{userID}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "删除用户";
            operation_id: "DeleteUser";
            tags: "用户管理";
        };
    }

    rpc GetUser(GetUserRequest) returns (GetUserResponse) {
        option (google.api.http) = {
            get: "/v1/users/{userID}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取用户信息";
            operation_id: "GetUser";
            tags: "用户管理";
        };
    }

    rpc ListUser(ListUserRequest) returns (ListUserResponse) {
        option (google.api.http) = {
            get: "/v1/users",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "列出所有用户";
            operation_id: "ListUser";
            tags: "用户管理";
        };
    }

    rpc CreatePost(CreatePostRequest) returns (CreatePostResponse) {
        option (google.api.http) = {
            post: "/v1/posts",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "创建文章";
            operation_id: "CreatePost";
            tags: "博客管理";
        };
    }

    rpc UpdatePost(UpdatePostRequest) returns (UpdatePostResponse) {
        option (google.api.http) = {
            put: "/v1/posts/{postID}",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "更新文章";
            operation_id: "UpdatePost";
            tags: "博客管理";
        };
    }

    rpc DeletePost(DeletePostRequest) returns (DeletePostResponse) {
        option (google.api.http) = {
            delete: "/v1/posts",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "删除文章";
            operation_id: "DeletePost";
            tags: "博客管理";
        };
    }

    rpc GetPost(GetPostRequest) returns (GetPostResponse) {
        option (google.api.http) = {
            get: "/v1/posts/{postID}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取文章信息";
            operation_id: "GetPost";
            tags: "博客管理";
        };
    }

    rpc ListPost(ListPostRequest) returns (ListPostResponse) {
        option (google.api.http) = {
            get: "/v1/posts",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "列出所有文章";
            operation_id: "ListPost";
            tags: "博客管理";
        };
    }

    rpc ListAINews(ListAINewsRequest) returns (ListAINewsResponse) {
        option (google.api.http) = {
            get: "/v1/ai-news",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "列出AI资讯";
            operation_id: "ListAINews";
            tags: "AI资讯管理";
        };
    }

    rpc GetAINews(GetAINewsRequest) returns (GetAINewsResponse) {
        option (google.api.http) = {
            get: "/v1/ai-news/{id}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取AI资讯详情";
            operation_id: "GetAINews";
            tags: "AI资讯管理";
        };
    }

    rpc RefreshAINews(RefreshAINewsRequest) returns (RefreshAINewsResponse) {
        option (google.api.http) = {
            post: "/v1/ai-news/refresh",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "刷新AI资讯";
            operation_id: "RefreshAINews";
            tags: "AI资讯管理";
        };
    }
}
