syntax = "proto3";

package v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/onexstack/miniblog/pkg/api/apiserver/v1";

message AINews {
    string id = 1;
    string title = 2;
    string summary = 3;
    string content_url = 4;
    string source_platform = 5;
    string source_author = 6;
    google.protobuf.Timestamp published_at = 7;
    google.protobuf.Timestamp fetched_at = 8;
    repeated string tags = 9;
    int64 view_count = 10;
}

message ListAINewsRequest {
    int64 offset = 1;
    int64 limit = 2;
    optional string source_platform = 3;
}

message ListAINewsResponse {
    int64 total_count = 1;
    repeated AINews news_list = 2;
}

message GetAINewsRequest {
    string id = 1;
}

message GetAINewsResponse {
    AINews news = 1;
}

message RefreshAINewsRequest {
    repeated string platforms = 1;
}

message RefreshAINewsResponse {
    string message = 1;
}
